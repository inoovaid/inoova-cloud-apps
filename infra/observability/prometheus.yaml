apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.3.1
    helm:
      values: |
        grafana:
          adminPassword: admin
          service:
            type: NodePort

          # 🔥 DATASOURCES AUTOMÁTICOS
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki-gateway.observability.svc.cluster.local
              isDefault: false

        prometheus:
          service:
            type: NodePort
          prometheusSpec:
            storageSpec: {}

        alertmanager:
          enabled: false

        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Replace=true
      - ServerSideApply=true
