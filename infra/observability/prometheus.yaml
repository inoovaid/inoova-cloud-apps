apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.3.1

    helm:
      values: |
        grafana:
          adminPassword: admin

          service:
            type: NodePort

          # 🔥 ESSENCIAL PRA FUNCIONAR DATASOURCE AUTOMÁTICO
          sidecar:
            datasources:
              enabled: true
              label: grafana_datasource
              searchNamespace: ALL

          # 🔥 LOKI AUTOMÁTICO
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki-gateway.observability.svc.cluster.local
              isDefault: false

        prometheus:
          service:
            type: NodePort
          prometheusSpec:
            storageSpec: {}

        alertmanager:
          enabled: false

        # 🔥 DESLIGA COMPONENTES QUE QUEBRAM EM LAB
        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false

        # 🔥 EVITA BUG DE WEBHOOK (CRÍTICO)
        prometheusOperator:
          admissionWebhooks:
            enabled: false
            patch:
              enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - Replace=true
      - ServerSideApply=true
      - CreateNamespace=true
