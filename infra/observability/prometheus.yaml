apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.3.1
    helm:
      values: |
        grafana:
          adminPassword: admin
          service:
            type: NodePort

        prometheus:
          service:
            type: NodePort
          prometheusSpec:
            storageSpec: {}

        # 🔥 NÃO DESATIVA WEBHOOK — DEIXA PADRÃO
        # (isso evita erro de secret e container travado)

        # 🔥 REDUZ COMPLEXIDADE (LAB)
        alertmanager:
          enabled: false

        kubeApiServer:
          enabled: false

        kubeControllerManager:
          enabled: false

        kubeScheduler:
          enabled: false

        kubeEtcd:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Replace=true
      - ServerSideApply=true
