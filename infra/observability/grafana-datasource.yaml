apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"

data:
  datasources.yaml: |
    apiVersion: 1
    datasources:

      - name: Loki
        type: loki
        access: proxy
        url: http://loki-stack.observability:3100
