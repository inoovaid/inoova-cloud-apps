apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"

data:
  datasources.yaml: |
    apiVersion: 1
    datasources:

      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-stack-kube-prom-prometheus.observability:9090
        isDefault: true

      - name: Loki
        type: loki
        access: proxy
        url: http://loki-stack.observability:3100
        jsonData:
          httpMethod: GET
