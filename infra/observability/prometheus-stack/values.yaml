grafana:
  enabled: true

  sidecar:
    datasources:
      enabled: true

  # ❌ NÃO usar isso
  additionalDataSources: []

  adminPassword: admin

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana-cloud.dnn.lat
    path: /
    pathType: Prefix
    tls:
      - hosts:
          - grafana-cloud.dnn.lat
        secretName: wildcard-dnn

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
