grafana:
  enabled: true

  adminPassword: admin

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    ingressClassName: nginx

    hosts:
      - grafana-cloud.dnn.lat

    path: /
    pathType: Prefix

    tls:
      - hosts:
          - grafana-cloud.dnn.lat
        secretName: wildcard-dnn


prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
