apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.0.0

    helm:
      skipCrds: false
      values: |
        grafana:
          enabled: true
          adminPassword: admin

          persistence:
            enabled: false

          service:
            type: ClusterIP
            port: 80

          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana-cloud.dnn.lat
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - grafana-cloud.dnn.lat
                secretName: wildcard-dnn

          # 🔥 PROMETHEUS = DEFAULT (CORRETO)
          datasources:
            datasources.yaml:
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  access: proxy
                  url: http://prometheus-stack-kube-prom-prometheus:9090
                  isDefault: true

                - name: Loki
                  type: loki
                  access: proxy
                  url: http://loki.observability:3100
                  isDefault: false   # 🔥 ESSENCIAL

        prometheus:
          enabled: true

        alertmanager:
          enabled: true

        nodeExporter:
          enabled: true

        kubeStateMetrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
