helm:
  skipCrds: false

  values: |
    grafana:
      enabled: true
      adminPassword: admin

      persistence:
        enabled: false

      service:
        type: ClusterIP
        port: 80

      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana-cloud.dnn.lat
        path: /
        pathType: Prefix
        tls:
          - hosts:
              - grafana-cloud.dnn.lat
            secretName: wildcard-dnn

      # 🔥 CORREÇÃO DEFINITIVA
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.observability:3100
          isDefault: false

      # 🔥 AQUI FORÇAMOS O PROMETHEUS
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
            - name: Prometheus
              type: prometheus
              access: proxy
              url: http://prometheus-stack-kube-prom-prometheus:9090
              isDefault: true

    prometheus:
      enabled: true

    alertmanager:
      enabled: true

    nodeExporter:
      enabled: true

    kubeStateMetrics:
      enabled: true
