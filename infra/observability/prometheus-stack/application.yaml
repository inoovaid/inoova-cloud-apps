apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 58.0.0

    helm:
      values: |
        grafana:
          enabled: true
          adminPassword: admin

          persistence:
            enabled: false

          ingress:
            enabled: true
            ingressClassName: nginx
            hosts:
              - grafana-cloud.dnn.lat
            path: /
            pathType: Prefix
            tls:
              - hosts:
                  - grafana-cloud.dnn.lat
                secretName: wildcard-dnn

        prometheus:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
