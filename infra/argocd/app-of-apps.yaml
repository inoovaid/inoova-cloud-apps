apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/inoovaid/inoova-cloud-apps
    targetRevision: main
    path: infra   # 👈 TEM QUE EXISTIR kustomization.yaml aqui

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
