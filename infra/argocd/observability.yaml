apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/inoovaid/inoova-cloud-apps.git
    targetRevision: main
    path: infra/observability

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
