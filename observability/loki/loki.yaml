apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd

spec:
  project: default

  destination:
    namespace: observability
    server: https://kubernetes.default.svc

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 5.47.2

    helm:
      values: |
        loki:
          auth_enabled: false

          ############################################
          # 🔥 CONFIG BASE
          ############################################
          commonConfig:
            replication_factor: 1

          ############################################
          # 🔥 STORAGE LOCAL (PERSISTENTE)
          ############################################
          storage:
            type: filesystem

          storage_config:
            filesystem:
              directory: /var/loki

          ############################################
          # 🔥 SCHEMA
          ############################################
          schemaConfig:
            configs:
              - from: 2024-01-01
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

          ############################################
          # 🔥 LIMITES (EVITA MATAR O CLUSTER)
          ############################################
          limits_config:
            ingestion_rate_mb: 4
            ingestion_burst_size_mb: 6

          ############################################
          # 🔥 RING SIMPLES (LAB)
          ############################################
          ring:
            kvstore:
              store: inmemory

          ############################################
          # 🔥 MONITORAMENTO (PROMETHEUS)
          ############################################
          monitoring:
            enabled: true
            dashboards:
              enabled: false
            serviceMonitor:
              enabled: true
              interval: 30s

        ############################################
        # 🔥 MODO SINGLE BINARY (ESTÁVEL)
        ############################################
        singleBinary:
          replicas: 1

          persistence:
            enabled: true
            size: 5Gi
            accessModes:
              - ReadWriteOnce

          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              cpu: 300m
              memory: 400Mi

          ############################################
          # 🔥 PROBES CORRIGIDOS (ESSENCIAL)
          ############################################
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10

        ############################################
        # 🔥 SERVICE
        ############################################
        service:
          type: ClusterIP

        ############################################
        # 🔥 DESATIVA MONITORING DUPLICADO (IMPORTANTE)
        ############################################
        monitoring:
          enabled: false

  ############################################
  # 🔥 ARGOCD AUTO SYNC
  ############################################
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
