apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd

spec:
  project: default

  destination:
    namespace: observability
    server: https://kubernetes.default.svc

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: minio
    targetRevision: 14.6.0

    helm:
      values: |
        image:
          registry: quay.io
          repository: minio/minio
          tag: latest
          pullPolicy: IfNotPresent

        auth:
          rootUser: admin
          rootPassword: admin

        defaultBuckets: loki

        persistence:
          enabled: true
          size: 5Gi

        service:
          type: ClusterIP

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
