apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"

data:
  loki-observability-advanced.json: |
    {
      "id": null,
      "title": "Loki Observability (Inoova - FIXED)",
      "schemaVersion": 38,
      "version": 4,
      "refresh": "10s",

      "templating": {
        "list": [

          {
            "name": "container",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values(container)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": true
          },

          {
            "name": "pod",
            "type": "query",
            "datasource": "Loki",
            "query": "label_values({container=~\"$container\"}, pod)",
            "refresh": 2,
            "includeAll": true,
            "allValue": ".+",
            "multi": true
          }

        ]
      },

      "panels": [

        {
          "type": "logs",
          "title": "🔍 Logs (Filtrado)",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "{container=~\"$container\", pod=~\"$pod\"} |= \"\"",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 12, "w": 24, "x": 0, "y": 0 }
        },

        {
          "type": "timeseries",
          "title": "📈 Logs/sec",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "rate({container=~\"$container\", pod=~\"$pod\"}[1m])",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 }
        },

        {
          "type": "stat",
          "title": "🔥 Total Logs (5m)",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "count_over_time({container=~\"$container\", pod=~\"$pod\"}[5m])",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 }
        },

        {
          "type": "timeseries",
          "title": "🚨 Errors",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "rate({container=~\"$container\", pod=~\"$pod\"} |= \"error\" [1m])",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 }
        },

        {
          "type": "timeseries",
          "title": "⚠️ Warnings",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "rate({container=~\"$container\", pod=~\"$pod\"} |= \"warn\" [1m])",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 }
        },

        {
          "type": "barchart",
          "title": "📊 Top Pods",
          "datasource": "Loki",
          "targets": [
            {
              "expr": "topk(5, sum by (pod) (count_over_time({container=~\"$container\"}[5m])))",
              "refId": "A"
            }
          ],
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 }
        }

      ]
    }
