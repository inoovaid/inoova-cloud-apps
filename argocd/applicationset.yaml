apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: inoova-apps
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/inoovaid/inoova-cloud-apps
        revision: HEAD
        directories:
          - path: k8s/*
          - path: k8s/saas-web-*
          - path: saas/web/*

  template:
    metadata:
      name: '{{path.basename}}'   # ✅ nome correto

    spec:
      project: default

      source:
        repoURL: https://github.com/inoovaid/inoova-cloud-apps
        targetRevision: HEAD
        path: '{{path}}/k8s'      # ✅ aponta para os manifests

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{path.basename}}'  # ✅ namespace correto

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true