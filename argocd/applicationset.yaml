apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: inoova-apps
  namespace: argocd

spec:
  generators:
    - git:
        repoURL: https://github.com/inoovaid/inoova-cloud-apps
        revision: HEAD
        directories:
          - path: saas/web/*

  template:
    metadata:
      name: 'saas-{{path.basename}}'   # ✅ ÚNICA forma correta

    spec:
      project: default

      source:
        repoURL: https://github.com/inoovaid/inoova-cloud-apps
        targetRevision: HEAD
        path: '{{path}}/k8s'      # ✅ importante

      destination:
        server: https://kubernetes.default.svc
        namespace: 'saas-{{path.basename}}'  # ✅

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true