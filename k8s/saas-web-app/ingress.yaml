apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saas-web-app
spec:
  rules:
    - host: app-cloud.dnn.lat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saas-web-app
                port:
                  number: 80
