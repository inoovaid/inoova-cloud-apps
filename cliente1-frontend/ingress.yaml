apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cliente1-frontend
  namespace: cliente1
spec:
  ingressClassName: nginx
  rules:
  - host: cliente1-apps-cloud.dnn.lat
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cliente1-frontend
            port:
              number: 80
