apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saas-web-iis
  namespace: saas-web-iis
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - iis.dnn.lat
      secretName: wildcard-dnn
  rules:
    - host: iis.dnn.lat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saas-web-iis
                port:
                  number: 80
