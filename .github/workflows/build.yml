name: Build e Push Docker

on:
  push:
    paths:
      - 'saas/web/app/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build imagem
        run: |
          docker build -t ${{ secrets.DOCKER_USER }}/saas-web-app:latest ./saas/web/app

      - name: Push imagem
        run: |
          docker push ${{ secrets.DOCKER_USER }}/saas-web-app:latest
