name: Build e Push Docker (Auto SaaS)

on:
  push:
    paths:
      - 'saas/web/**'
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set.outputs.apps }}

    steps:
      - uses: actions/checkout@v3

      - id: set
        run: |
          APPS=$(find saas/web -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          JSON=$(printf '%s\n' $APPS | jq -R -s -c 'split("\n")[:-1]')
          echo "apps=$JSON" >> $GITHUB_OUTPUT

  build:
    needs: detect
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}

    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build e Push (somente se tiver Dockerfile)
        run: |
          if [ -f "./saas/web/${{ matrix.app }}/Dockerfile" ]; then
            echo "🔨 Building ${{ matrix.app }}"
            docker build -t ${{ secrets.DOCKER_USER }}/saas-${{ matrix.app }}:latest ./saas/web/${{ matrix.app }}
            docker push ${{ secrets.DOCKER_USER }}/saas-${{ matrix.app }}:latest
          else
            echo "⏭️ Pulando ${{ matrix.app }} (sem Dockerfile)"
          fi
