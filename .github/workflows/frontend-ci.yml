name: Build and Deploy Frontend

on:
  push:
    paths:
      - "frontend-app/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build da imagem
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ github.sha }} ./frontend-app

      - name: Push da imagem
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ github.sha }}

      - name: Atualizar deployment.yaml
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/frontend-app:${{ github.sha }}|" frontend-app/deployment.yaml

      - name: Commit da nova imagem
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add frontend-app/deployment.yaml
          git commit -m "update image ${{ github.sha }}"
          git push
