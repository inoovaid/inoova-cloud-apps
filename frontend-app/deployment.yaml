apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: nginx
        image: heiffigjr/frontend-app:14047d86e52d78c0d87096fb7cf67babd1a4d243
        ports:
        - containerPort: 80
