---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openwebui-pvc
  namespace: ai-interfaces
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ai-interfaces
  labels:
    app: openwebui
    app.kubernetes.io/part-of: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
      - name: openwebui
        image: ghcr.io/open-webui/open-webui:main
        env:
        # Conexão nativa com Ollama (não usa OpenAI-compat)
        - name: OLLAMA_BASE_URL
          value: "http://ollama.ai-system.svc.cluster.local:11434"
        - name: WEBUI_AUTH
          value: "true"
        - name: DEFAULT_MODELS
          value: "qwen2.5-coder:14b"
        - name: ENABLE_RAG_WEB_SEARCH
          value: "true"
        - name: ENABLE_IMAGE_GENERATION
          value: "false"
        - name: WEBUI_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: secret-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: openwebui-secrets
              key: database-url
        # MCP tools endpoints
        - name: TOOLS_MCP_KUBERNETES_URL
          value: "http://mcp-kubernetes.ai-system.svc.cluster.local:3000/sse"
        - name: TOOLS_MCP_ARGOCD_URL
          value: "http://mcp-argocd.ai-system.svc.cluster.local:3001/sse"
        - name: TOOLS_MCP_GIT_URL
          value: "http://mcp-git.ai-system.svc.cluster.local:3002/sse"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: webui-data
          mountPath: /app/backend/data
      volumes:
      - name: webui-data
        persistentVolumeClaim:
          claimName: openwebui-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: ai-interfaces
  labels:
    app: openwebui
spec:
  selector:
    app: openwebui
  ports:
  - port: 80
    targetPort: 8080
