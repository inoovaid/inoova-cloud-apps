---
# Job alternativo para pull de modelos (caso o lifecycle hook falhe)
# Executar manualmente: kubectl apply -f modelfile-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-models
  namespace: ai-system
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-ai
      restartPolicy: OnFailure
      containers:
      - name: pull
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_HOST
          value: "http://ollama.ai-system.svc.cluster.local:11434"
        command:
        - /bin/sh
        - -c
        - |
          echo "Aguardando Ollama..."
          until curl -sf http://ollama.ai-system.svc.cluster.local:11434/api/tags; do
            sleep 5
          done
          echo "Pulling qwen2.5-coder:14b ..."
          ollama pull qwen2.5-coder:14b
          echo "Pulling nomic-embed-text (para RAG no Dify)..."
          ollama pull nomic-embed-text
          echo "Done! Modelos disponíveis:"
          ollama list
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
