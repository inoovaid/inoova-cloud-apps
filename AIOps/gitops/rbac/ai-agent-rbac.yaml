---
# ServiceAccount usado pelo MCP K8s e outros agentes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent
  namespace: ai-system
---
# ClusterRole: SOMENTE leitura do cluster (writes via ArgoCD/GitOps)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-agent-reader
rules:
- apiGroups: [""]
  resources:
  - pods
  - pods/log
  - services
  - endpoints
  - namespaces
  - nodes
  - persistentvolumes
  - persistentvolumeclaims
  - configmaps
  - events
  - resourcequotas
  - limitranges
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-agent-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-agent-reader
subjects:
- kind: ServiceAccount
  name: ai-agent
  namespace: ai-system
---
# Role no namespace argocd: trigger de sync
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-sync-trigger
  namespace: argocd
rules:
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-agent-argocd-binding
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-sync-trigger
subjects:
- kind: ServiceAccount
  name: ai-agent
  namespace: ai-system
---
# Long-lived token para o MCP usar fora do pod (opcional)
apiVersion: v1
kind: Secret
metadata:
  name: ai-agent-token
  namespace: ai-system
  annotations:
    kubernetes.io/service-account.name: ai-agent
type: kubernetes.io/service-account-token
