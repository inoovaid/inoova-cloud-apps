apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-agent-readonly

rules:

# Core API
- apiGroups: [""]
  resources:
    - pods
    - pods/log
    - pods/status
    - services
    - endpoints
    - namespaces
    - nodes
    - events
    - configmaps
    - secrets
    - persistentvolumes
    - persistentvolumeclaims
    - serviceaccounts
  verbs:
    - get
    - list
    - watch

# Apps
- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
    - daemonsets
    - statefulsets
  verbs:
    - get
    - list
    - watch

# Batch
- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs:
    - get
    - list
    - watch

# Networking
- apiGroups: ["networking.k8s.io"]
  resources:
    - ingresses
    - networkpolicies
    - ingressclasses
  verbs:
    - get
    - list
    - watch

# RBAC
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
    - roles
    - rolebindings
    - clusterroles
    - clusterrolebindings
  verbs:
    - get
    - list
    - watch

# Storage
- apiGroups: ["storage.k8s.io"]
  resources:
    - storageclasses
    - csidrivers
    - csinodes
  verbs:
    - get
    - list
    - watch

# Autoscaling
- apiGroups: ["autoscaling"]
  resources:
    - horizontalpodautoscalers
  verbs:
    - get
    - list
    - watch

# Policy
- apiGroups: ["policy"]
  resources:
    - poddisruptionbudgets
  verbs:
    - get
    - list
    - watch

# CRDs (erro que apareceu no log)
- apiGroups: ["apiextensions.k8s.io"]
  resources:
    - customresourcedefinitions
  verbs:
    - get
    - list
    - watch

# Cert Manager
- apiGroups: ["cert-manager.io"]
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch

# ArgoCD
- apiGroups: ["argoproj.io"]
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch

# Prometheus Operator
- apiGroups: ["monitoring.coreos.com"]
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch

# Traefik
- apiGroups: ["traefik.io"]
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch

# Gateway API
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch

# Qualquer outro recurso customizado
- apiGroups: ["*"]
  resources:
    - "*"
  verbs:
    - get
    - list
    - watch

# URLs da API
- nonResourceURLs:
    - "*"
  verbs:
    - get
