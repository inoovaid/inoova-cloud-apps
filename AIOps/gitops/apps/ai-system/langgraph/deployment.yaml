apiVersion: apps/v1
kind: Deployment

metadata:
  name: langgraph
  namespace: ai-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: langgraph

  template:
    metadata:
      labels:
        app: langgraph

    spec:
      containers:
      - name: langgraph

        image: langchain/langgraph-server:0.9.0-py3.11-wolfi

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        env:
        - name: OLLAMA_HOST
          value: "http://ollama-agents.ai-system.svc.cluster.local:11434"

        - name: MODEL
          value: "gemma3:4b"

        - name: DATABASE_URI
          value: "postgresql://appuser:AppPass123@postgres-ha-rw.default.svc.cluster.local:5432/langgraph"

        - name: REDIS_URI
          value: "redis://redis.ai-system.svc.cluster.local:6379"

        resources:
          requests:
            cpu: 250m
            memory: 512Mi

          limits:
            cpu: "1"
            memory: 2Gi
