---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ai-system
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-ai
      # Se o nó tiver taint de GPU
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      enableServiceLinks: false # Adicione esta linha
      containers:
      - name: vllm
        image: vllm/vllm-openai:v0.6.6
        args:
        - "--model=Qwen/Qwen2.5-Coder-14B-Instruct-AWQ"
        - "--tensor-parallel-size=1"        # usa RTX 5070 + RTX 3060
        - "--max-model-len=32768"
        - "--gpu-memory-utilization=0.88"
        - "--served-model-name=qwen2.5-coder"
        - "--host=0.0.0.0"
        - "--port=8000"
        - "--trust-remote-code"
        - "--enable-chunked-prefill"
        - "--max-num-seqs=16"
        env:
        - name: CUDA_DEVICE_ORDER
          value: "PCI_BUS_ID"
        - name: VLLM_USE_MARLIN
          value: "False"
        - name: CUDA_VISIBLE_DEVICES
          value: "0" # (Supondo que a 3060 seja a GPU 1. Se for a 0, troque para "0")
        - name: VLLM_USE_MODELSCOPE
          value: "False"
        - name: VLLM_TARGET_DEVICE
          value: "cuda"
        - name: VLLM_AWQ_BACKEND
          value: "triton"
        - name: VLLM_SKIP_DEVICE_CHECK
          value: "1"
        - name: VLLM_ATTENTION_BACKEND
          value: "TORCH_SDPA" # Tente mudar de Triton para FlashAttention
        # Adicione estas para isolar o ambiente de execução:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "compute,utility"
        - name: HF_HOME
          value: /cache/huggingface
        - name: NCCL_P2P_DISABLE
          value: "0"
        # Opcional: HuggingFace token para modelos privados
        # - name: HUGGING_FACE_HUB_TOKEN
        #   valueFrom:
        #     secretKeyRef:
        #       name: hf-token
        #       key: token
        resources:
          requests:
            nvidia.com/gpu: "1"
            memory: "16Gi"
            cpu: "4"
          limits:
            nvidia.com/gpu: "1"
            memory: "30Gi"
            cpu: "10"
        ports:
        - name: http
          containerPort: 8000
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 90     # até 15 min para download do modelo (1ª vez)
          periodSeconds: 10
          initialDelaySeconds: 30
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: model-cache
          mountPath: /cache
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi          # shared memory para multi-GPU NCCL
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ai-system
  labels:
    app: vllm
spec:
  selector:
    app: vllm
  ports:
  - name: http
    port: 8000
    targetPort: 8000
