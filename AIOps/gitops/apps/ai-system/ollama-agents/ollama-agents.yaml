apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-agents-pv

spec:
  capacity:
    storage: 100Gi

  accessModes:
    - ReadWriteOnce

  storageClassName: ollama-agents

  hostPath:
    path: /data/ollama-agents

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-agents-pvc
  namespace: ai-system

spec:
  storageClassName: ollama-agents

  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 100Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-agents
  namespace: ai-system

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ollama-agents

  template:
    metadata:
      labels:
        app: ollama-agents

    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-ai

      containers:
      - name: ollama

        image: ollama/ollama:0.30.6

        env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "GPU-77b2eae9-db51-2d9b-d193-aba441d086bf"

        resources:
          requests:
            cpu: "4"
            memory: "12Gi"
            nvidia.com/gpu: 1

          limits:
            cpu: "8"
            memory: "24Gi"
            nvidia.com/gpu: 1

        ports:
        - containerPort: 11434

        volumeMounts:
        - mountPath: /root/.ollama
          name: ollama-data

      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-agents-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: ollama-agents
  namespace: ai-system

spec:
  selector:
    app: ollama-agents

  ports:
  - port: 11434
    targetPort: 11434
