apiVersion: v1
kind: PersistentVolume
metadata:
  name: ollama-models-pv
spec:
  capacity:
    storage: 300Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ollama-models
  hostPath:
    path: /data/ollama
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: ai-system
spec:
  storageClassName: ollama-models
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-ai

      containers:
      - name: ollama

        image: ollama/ollama:latest

        resources:
          requests:
            cpu: "8"
            memory: "24Gi"
            nvidia.com/gpu: 1

          limits:
            cpu: "18"
            memory: "48Gi"
            nvidia.com/gpu: 1

        ports:
        - containerPort: 11434

        volumeMounts:
        - mountPath: /root/.ollama
          name: ollama-data

      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-system
spec:
  selector:
    app: ollama

  ports:
  - port: 11434
    targetPort: 11434
