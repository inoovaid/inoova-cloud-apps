---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ai-system
  labels:
    app: ollama
    app.kubernetes.io/part-of: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Fixar no nó com as GPUs
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-ai
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0"
        - name: OLLAMA_MODELS
          value: "/models"
        - name: OLLAMA_NUM_PARALLEL
          value: "2"
        - name: OLLAMA_MAX_LOADED_MODELS
          value: "1"
        # Pull automático do modelo na inicialização
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                sleep 5
                ollama pull qwen2.5-coder:14b &
        resources:
          requests:
            nvidia.com/gpu: "2"
            memory: "32Gi"
            cpu: "8"
          limits:
            nvidia.com/gpu: "2"
            memory: "55Gi"
            cpu: "18"
        ports:
        - name: http
          containerPort: 11434
          protocol: TCP
        startupProbe:
          httpGet:
            path: /
            port: 11434
          failureThreshold: 60
          periodSeconds: 10
          initialDelaySeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /models
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ollama-models-pvc
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ai-system
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
  - name: http
    port: 11434
    targetPort: 11434
