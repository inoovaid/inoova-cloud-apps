apiVersion: apps/v1
kind: Deployment

metadata:
  name: openclaw
  namespace: openclaw

spec:
  replicas: 1

  selector:
    matchLabels:
      app: openclaw

  template:
    metadata:
      labels:
        app: openclaw

    spec:
      containers:
      - name: openclaw

        image: ghcr.io/openclaw/openclaw:latest

        command:
        - sh

        - -c

        args:
        - |
          cp /config/openclaw.json /home/node/.openclaw/openclaw.json
          exec openclaw gateway run

        ports:
        - containerPort: 18789
          name: http

        volumeMounts:

        - name: config
          mountPath: /config

        - name: data
          mountPath: /home/node/.openclaw

      volumes:

      - name: config
        configMap:
          name: openclaw-config

      - name: data
        persistentVolumeClaim:
          claimName: openclaw-pvc
