apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest

        env:
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        - name: OPENAI_API_KEY
          value: "ollama-local"
        - name: OLLAMA_API_KEY
          value: "ollama-local"
        - name: OLLAMA_PRIMARY_API_KEY
          value: "ollama-local"
        - name: OLLAMA_SECONDARY_API_KEY
          value: "ollama-local"

        command:
        - sh
        - -c
        args:
        - |
          mkdir -p /home/node/.openclaw
          cp /config/openclaw.json /home/node/.openclaw/openclaw.json
          exec openclaw gateway run --bind lan

        ports:
        - containerPort: 18789
          name: gateway

        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /home/node/.openclaw

      volumes:
      - name: config
        configMap:
          name: openclaw-config
      - name: data
        persistentVolumeClaim:
          claimName: openclaw-pvc
