apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop:
            - ALL
      containers:
      - name: openclaw
        image: ghcr.io/openclaw/openclaw:latest
        securityContext:
          readOnlyRootFilesystem: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 18789
          name: gateway
        env:
        - name: OPENCLAW_GATEWAY_TOKEN
          valueFrom:
            secretKeyRef:
              name: openclaw-secrets
              key: OPENCLAW_GATEWAY_TOKEN
        - name: OLLAMA_BASE_URL
          value: "http://ollama.ai-system:11434"
        volumeMounts:
        - name: openclaw-config
          mountPath: /etc/openclaw/config
          readOnly: true
        - name: openclaw-state
          mountPath: /root/.openclaw
      volumes:
      - name: openclaw-config
        configMap:
          name: openclaw-config
      - name: openclaw-state
        persistentVolumeClaim:
          claimName: openclaw-pvc
