apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "auth": {
          "mode": "token",
          "token": "96a05fc16a428fdb389edd73713c541316992ca860d9d864"
        },
        "port": 18789,
        "bind": "lan",
        "trustedProxies": ["10.0.0.0/8", "192.168.0.0/16", "172.16.0.0/12"],
        "controlUi": {
          "allowedOrigins": ["https://openclaw.dnn.lat", "http://openclaw.dnn.lat"]
        }
      },
      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace",
          "model": {
            "primary": "ollama/qwen2.5-7b-64k",
            "fallbacks": ["ollama/qwen2.5-coder:7b"]
          },
          "memorySearch": { "enabled": false }
        }
      },
      "mcp": {
        "servers": {
          "kubernetes": {
            "transport": "streamable-http",
            "url": "http://mcp-kubernetes.ai-system.svc.cluster.local:8000/mcp",
            "headers": {
              "Accept": "application/json, text/event-stream"
            },
            "connectionTimeoutMs": 15000
          }
        }
      },
      "models": {
        "mode": "merge",
        "providers": {
          "ollama": {
            "baseUrl": "http://ollama.ai-system.svc.cluster.local:11434/v1",
            "models": [
              {
                "id": "qwen2.5-7b-64k",
                "name": "Qwen2.5 32B Instruct",
                "api": "openai-completions",
                "contextWindow": 65536,
                "maxTokens": 4096
              },
              {
                "id": "qwen2.5-coder:7b",
                "name": "Qwen2.5 Coder 7B",
                "api": "openai-completions",
                "contextWindow": 65536,
                "maxTokens": 4096
              }
            ]
          }
        }
      }
    }
