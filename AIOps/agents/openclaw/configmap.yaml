apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  AGENTS.md: |
    # OpenClaw Agents

    ## Default Agent

    - id: default
      name: OpenClaw Assistant
      description: OpenClaw integrado ao ambiente Kubernetes, ArgoCD, GitOps e Ollama
      provider: ollama-primary
      model: qwen2.5-coder:7b
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "auth": {
          "mode": "token",
          "token": "96a05fc16a428fdb389edd73713c541316992ca860d9d864"
        },
        "port": 18789,
        "bind": "lan",
        "controlUi": {
          "allowedOrigins": [
            "https://openclaw.dnn.lat",
            "http://localhost:18789",
            "http://127.0.0.1:18789"
          ]
        }
      },

      "agents": {
        "defaults": {
          "workspace": "/home/node/.openclaw/workspace"
        }
      },

      "models": {
        "providers": {
          "ollama-primary": {
            "api": "ollama",
            "baseUrl": "http://ollama.ai-system.svc.cluster.local:11434",
            "models": {
              "qwen2.5-coder:7b": {
                "contextWindow": 32000,
                "maxTokens": 8000
              }
            }
          },
          "ollama-secondary": {
            "api": "ollama",
            "baseUrl": "http://ollama-agents.ai-system.svc.cluster.local:11434",
            "models": {
              "qwen2.5-coder:7b": {
                "contextWindow": 32000,
                "maxTokens": 8000
              }
            }
          }
        },
        "defaults": {
          "provider": "ollama-primary",
          "model": "qwen2.5-coder:7b"
        }
      }
    }

