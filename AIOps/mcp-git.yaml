---
# Secret criado via bootstrap.sh:
# kubectl create secret generic git-mcp-config --namespace ai-system \
#   --from-literal=repo-url="https://github.com/inoovaid/inoova-cloud-apps.git" \
#   --from-literal=token="SEU_GITHUB_TOKEN" \
#   --from-literal=user-email="ai-agent@inoova.com" \
#   --from-literal=user-name="Inoova AI Agent"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-git
  namespace: ai-system
  labels:
    app: mcp-git
    app.kubernetes.io/part-of: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-git
  template:
    metadata:
      labels:
        app: mcp-git
    spec:
      containers:
      - name: mcp-git
        image: mcp/git:latest
        env:
        - name: GIT_REPO_URL
          valueFrom:
            secretKeyRef:
              name: git-mcp-config
              key: repo-url
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: git-mcp-config
              key: token
        - name: GIT_USER_EMAIL
          valueFrom:
            secretKeyRef:
              name: git-mcp-config
              key: user-email
        - name: GIT_USER_NAME
          valueFrom:
            secretKeyRef:
              name: git-mcp-config
              key: user-name
        - name: GIT_BRANCH
          value: "main"
        - name: GIT_WORK_DIR
          value: "/workspace/inoova-cloud-apps/AIOps"
        - name: MCP_PORT
          value: "3002"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        ports:
        - containerPort: 3002
        volumeMounts:
        - name: workspace
          mountPath: /workspace
      volumes:
      - name: workspace
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-git
  namespace: ai-system
spec:
  selector:
    app: mcp-git
  ports:
  - port: 3002
    targetPort: 3002
