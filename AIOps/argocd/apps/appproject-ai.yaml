---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ai-platform
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.io
spec:
  description: "AI Platform — Ollama · OpenWebUI · Dify · n8n · MCP Servers"
  sourceRepos:
  - "https://github.com/inoovaid/inoova-cloud-apps.git"
  destinations:
  - namespace: ai-system
    server: https://kubernetes.default.svc
  - namespace: ai-interfaces
    server: https://kubernetes.default.svc
  - namespace: ai-automation
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace
  - group: rbac.authorization.k8s.io
    kind: ClusterRole
  - group: rbac.authorization.k8s.io
    kind: ClusterRoleBinding
  - group: ""
    kind: PersistentVolume
  - group: storage.k8s.io
    kind: StorageClass
  namespaceResourceWhitelist:
  - group: "*"
    kind: "*"
  roles:
  - name: ai-agent
    description: "AI agent — pode trigger sync via MCP"
    policies:
    - p, proj:ai-platform:ai-agent, applications, sync, ai-platform/*, allow
    - p, proj:ai-platform:ai-agent, applications, get, ai-platform/*, allow
