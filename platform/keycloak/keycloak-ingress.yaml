apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: keycloak
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    # 🔥 FORÇA HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # 🔥 INFORMA PRO KEYCLOAK QUE É HTTPS
    nginx.ingress.kubernetes.io/x-forwarded-proto: "https"

spec:
  ingressClassName: nginx

  rules:
    - host: login-cloud.dnn.lat
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
