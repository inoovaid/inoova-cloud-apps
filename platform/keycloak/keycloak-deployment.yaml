apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak

spec:
  replicas: 2
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app: keycloak

  template:
    metadata:
      labels:
        app: keycloak

    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0

          # ✅ SEM optimized (evita bug com ENV)
          args: ["start"]

          ports:
            - containerPort: 8080

          env:
            # 🔥 DATABASE (FORMA CORRETA)
            - name: KC_DB
              value: postgres

            - name: KC_DB_URL_HOST
              value: postgres-ha-rw.default.svc.cluster.local

            - name: KC_DB_URL_DATABASE
              value: keycloak

            - name: KC_DB_URL_PORT
              value: "5432"

            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username

            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password

            # 🌐 ACESSO
            - name: KC_HOSTNAME
              value: login-cloud.dnn.lat

            - name: KC_PROXY
              value: edge

            - name: KC_HTTP_ENABLED
              value: "true"

            # 📊 HEALTH / METRICS
            - name: KC_HEALTH_ENABLED
              value: "true"

            - name: KC_METRICS_ENABLED
              value: "true"

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 20
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
