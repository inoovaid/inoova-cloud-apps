apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:

      # 🔥 GARANTE QUE O BANCO ESTÁ PRONTO
      initContainers:
        - name: wait-postgres
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z postgres-ha-rw.default.svc.cluster.local 5432; do
                echo "⏳ waiting for postgres..."
                sleep 5
              done

      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.3

          args: ["start"]

          ports:
            - containerPort: 8080

          env:
            - name: KC_DB
              value: postgres

            # ✅ FORMATO CORRETO (SEM BUG)
            - name: KC_DB_URL_HOST
              value: postgres-ha-rw.default.svc.cluster.local

            - name: KC_DB_URL_PORT
              value: "5432"

            - name: KC_DB_URL_DATABASE
              value: keycloak

            - name: KC_DB_USERNAME
              value: keycloak

            - name: KC_DB_PASSWORD
              value: keycloak

            - name: KEYCLOAK_ADMIN
              value: admin

            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: default
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30007
